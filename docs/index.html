<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Recursive Agentic Improvements: custom slash commands for Claude Code to automate creation, testing, and recursive optimization of AI agents across Agno, CrewAI, LangGraph, and Google ADK." />
<title>Recursive Agentic Improvements</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Surfaces — near-black to deep navy */
    --bg-0: #04050a;
    --bg-1: #070912;
    --bg-2: #0b0f1e;
    --panel: #0d1226;
    --panel-2: #11183063;
    --line: #1c2748;
    --line-soft: #161f3b;

    /* Navy / indigo family lifted from hero art */
    --navy: #1b2447;
    --navy-2: #232e5c;
    --indigo: #2f3d7a;

    /* Glow accents */
    --glow: #8a96ff;          /* periwinkle electric */
    --glow-bright: #c9d4ff;   /* near-white cool */
    --cyan: #6fe3ff;
    --ok: #59e3a7;            /* checkmark green */

    /* Text */
    --ink: #eef1fb;
    --ink-dim: #aab2d0;
    --ink-mute: #6b7499;

    --mono: "JetBrains Mono", ui-monospace, monospace;
    --display: "Space Grotesk", system-ui, sans-serif;
    --body: "IBM Plex Sans", system-ui, sans-serif;

    --maxw: 1180px;
    --r: 14px;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg-0);
    color: var(--ink);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Ambient field */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(900px 600px at 78% -8%, rgba(138,150,255,0.16), transparent 60%),
      radial-gradient(700px 500px at 8% 4%, rgba(47,61,122,0.22), transparent 60%),
      radial-gradient(1000px 800px at 50% 120%, rgba(111,227,255,0.06), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  /* faint grid */
  body::after {
    content: "";
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(138,150,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(138,150,255,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(1200px 900px at 60% 20%, #000 0%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  ::selection { background: rgba(138,150,255,0.32); color: #fff; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-track { background: var(--bg-0); }
  ::-webkit-scrollbar-thumb { background: #1b2448; border-radius: 20px; border: 3px solid var(--bg-0); }
  ::-webkit-scrollbar-thumb:hover { background: #283566; }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }

  /* utility: prompt chip */
  .kbd {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--glow-bright);
    border: 1px solid var(--line);
    background: var(--panel-2);
    padding: 2px 8px;
    border-radius: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes dash { to { stroke-dashoffset: 0; } }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @keyframes pulseGlow {
    0%,100% { opacity: .55; }
    50% { opacity: 1; }
  }
  @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  @keyframes dashflow { to { stroke-dashoffset: -20; } }
  @keyframes riseIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
    html { scroll-behavior: auto; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="loop.jsx"></script>
<script type="text/babel" src="styles.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
